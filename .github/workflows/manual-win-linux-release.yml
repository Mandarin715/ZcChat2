name: Build and Release (Windows Portable)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (example: v1.6.1)"
        required: true
      qt_version:
        description: "Qt version"
        required: false
        default: "6.6.3"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ inputs.qt_version }}
          target: desktop
          arch: win64_msvc2019_64
          modules: qtmultimedia
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake -S ZcChat2 -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      - name: Build
        run: cmake --build build

      - name: Package
        shell: pwsh
        run: |
          $dist = "dist\Mandarin"
          New-Item -ItemType Directory -Force $dist | Out-Null

          # 主程序
          Copy-Item build\Mandarin.exe $dist\

          # windeployqt
          $qtBin = Join-Path "$env:Qt6_DIR" "bin"
          & "$qtBin\windeployqt.exe" --release --compiler-runtime "$dist\Mandarin.exe"

          # 第三方 dll
          Get-ChildItem -Path ZcChat2\3rdparty -Recurse -File -Filter *.dll |
            Where-Object { $_.FullName -match "(\\|/)bin(\\|/)" } |
            ForEach-Object { Copy-Item $_.FullName "$dist\" -Force }

          # 启动脚本
          Copy-Item ZcChat2\启动.bat $dist\ -Force

          # 默认配置
          New-Item -ItemType Directory -Force "$dist\.config\Mandarin" | Out-Null
          Copy-Item ZcChat2\res\default_config\ZcChat2\* "$dist\.config\Mandarin" -Recurse -Force

          # 打包
          $zipName = "Mandarin-${{ inputs.tag_name }}-portable.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $zipName -Force

          echo "zip=$zipName" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: "Mandarin ${{ inputs.tag_name }}"
          generate_release_notes: true
          files: Mandarin-${{ inputs.tag_name }}-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
